Description: Cross-platform desktop installer that side-loads any app onto Samsung Smart TVs, projectors and smart monitors running Tizen OS — Jellyfin, Moonlight, Moonfin, Litefin and a community catalog, or your own WGT package. Handles device discovery, Tizen certificates and installation. Successor to Jellyfin2Samsung.Jellyfin2Samsung.
